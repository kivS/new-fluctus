<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Watch Later</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <style>
        :root {
            color-scheme: light;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            background: #f8f8f8;
            color: #1f1f1f;
        }

        .app {
            max-width: 760px;
            margin: 0 auto;
            padding: 28px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 30px;
        }

        .hint {
            margin: 0 0 18px;
            color: #575757;
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        button {
            border: 1px solid #b8b8b8;
            background: white;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #f3f3f3;
        }

        button:disabled {
            cursor: default;
            opacity: 0.65;
        }

        .toolbar-status {
            color: #575757;
            font-size: 13px;
            line-height: 1.3;
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 10px;
        }

        li {
            border: 1px solid #d4d4d4;
            border-radius: 10px;
            background: white;
            padding: 12px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .title {
            margin: 0;
            font-size: 16px;
            line-height: 1.3;
            word-break: break-word;
        }

        .meta {
            margin: 4px 0 0;
            font-size: 12px;
            color: #5e5e5e;
            line-height: 1.4;
            word-break: break-all;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .danger {
            border-color: #d7aaaa;
            color: #9d2323;
        }

        .empty {
            border: 1px dashed #bdbdbd;
            border-radius: 10px;
            padding: 18px;
            color: #4d4d4d;
            background: #fcfcfc;
        }
    </style>
</head>

<body>
    <main class="app">
        <h1>Watch Later</h1>
        <p class="hint">Use <strong>Alt+Shift+S</strong> while a player window is focused to save it. Use <strong>Alt+Shift+O</strong> to open this list.</p>
        <div class="toolbar">
            <button id="refresh-btn" type="button">Refresh</button>
            <button id="fix-youtube-titles-btn" type="button">Fix YouTube Titles</button>
            <span id="toolbar-status" class="toolbar-status" role="status" aria-live="polite"></span>
        </div>
        <div id="empty-state" class="empty" hidden>No saved videos yet.</div>
        <ul id="watch-later-list"></ul>
    </main>
    <script>
        const listElement = document.getElementById('watch-later-list');
        const emptyStateElement = document.getElementById('empty-state');
        const refreshButton = document.getElementById('refresh-btn');
        const fixYoutubeTitlesButton = document.getElementById('fix-youtube-titles-btn');
        const toolbarStatusElement = document.getElementById('toolbar-status');

        function buildSavedAtLabel(savedAt) {
            const savedDate = new Date(savedAt);
            if (Number.isNaN(savedDate.getTime())) {
                return 'Saved recently';
            }

            return `Saved ${savedDate.toLocaleString()}`;
        }

        function clearList() {
            while (listElement.firstChild) {
                listElement.removeChild(listElement.firstChild);
            }
        }

        function createActionButton(label, action, itemId, className) {
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = label;
            button.dataset.action = action;
            button.dataset.itemId = itemId;
            if (className) {
                button.classList.add(className);
            }

            return button;
        }

        function createListItem(item) {
            const listItem = document.createElement('li');

            const row = document.createElement('div');
            row.className = 'row';

            const info = document.createElement('div');

            const title = document.createElement('p');
            title.className = 'title';
            title.textContent = item.title || 'Untitled media';

            const meta = document.createElement('p');
            meta.className = 'meta';
            const savedAtLabel = buildSavedAtLabel(item.savedAt);
            meta.textContent = item.sourceUrl ? `${savedAtLabel} | ${item.sourceUrl}` : savedAtLabel;

            info.appendChild(title);
            info.appendChild(meta);

            const actions = document.createElement('div');
            actions.className = 'item-actions';
            actions.appendChild(createActionButton('Open', 'open', item.id));
            actions.appendChild(createActionButton('Remove', 'remove', item.id, 'danger'));

            row.appendChild(info);
            row.appendChild(actions);
            listItem.appendChild(row);

            return listItem;
        }

        async function loadWatchLaterList() {
            if (!window.watchLater?.list) {
                emptyStateElement.hidden = false;
                emptyStateElement.textContent = 'Watch Later APIs are unavailable.';
                clearList();
                return;
            }

            const items = await window.watchLater.list();
            clearList();

            if (!items.length) {
                emptyStateElement.hidden = false;
                return;
            }

            emptyStateElement.hidden = true;
            items.forEach((item) => {
                listElement.appendChild(createListItem(item));
            });
        }

        refreshButton.addEventListener('click', () => {
            loadWatchLaterList();
        });

        fixYoutubeTitlesButton.addEventListener('click', async () => {
            if (!window.watchLater?.backfillYoutubeTitles) {
                toolbarStatusElement.textContent = 'Title lookup is unavailable.';
                return;
            }

            fixYoutubeTitlesButton.disabled = true;
            toolbarStatusElement.textContent = 'Looking up titles...';

            try {
                const result = await window.watchLater.backfillYoutubeTitles();
                await loadWatchLaterList();

                if (!result.checkedCount) {
                    toolbarStatusElement.textContent = 'No YouTube titles to fix found.';
                } else if (result.updatedCount === 1) {
                    toolbarStatusElement.textContent = 'Updated 1 YouTube title.';
                } else if (result.updatedCount > 1) {
                    toolbarStatusElement.textContent = `Updated ${result.updatedCount} YouTube titles.`;
                } else {
                    toolbarStatusElement.textContent = `Found ${result.checkedCount}, but none could be updated.`;
                }
            } catch (error) {
                toolbarStatusElement.textContent = 'Unable to update YouTube titles.';
            } finally {
                fixYoutubeTitlesButton.disabled = false;
            }
        });

        listElement.addEventListener('click', async (event) => {
            const button = event.target.closest('button[data-action]');
            if (!button) return;

            const { action, itemId } = button.dataset;
            if (!itemId) return;

            if (action === 'open') {
                await window.watchLater.open(itemId);
                return;
            }

            if (action === 'remove') {
                await window.watchLater.remove(itemId);
                await loadWatchLaterList();
            }
        });

        loadWatchLaterList();
    </script>
</body>

</html>
